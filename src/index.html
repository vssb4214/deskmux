<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskMux</title>
  </head>

  <body>
    <main class="container">
      <header class="page-header">
        <h1>DeskMux</h1>
        <p class="subtitle">Monitor preset switcher</p>
      </header>

      <div id="bootstrap-banner" class="banner banner-warning" hidden></div>
      <div id="status-banner" class="banner banner-info" hidden></div>
      <p id="loading" class="loading">Starting…</p>

      <section class="card">
        <div class="card-header">
          <h2>Status</h2>
          <button id="refresh-btn" type="button" class="btn btn-secondary">Refresh</button>
        </div>
        <div id="status-panel"></div>
      </section>

      <section class="card">
        <h2>Monitors</h2>
        <div id="monitor-list"></div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Monitor discovery</h2>
          <button id="detect-btn" type="button" class="btn btn-secondary">
            Detect displays
          </button>
        </div>
        <div id="discovery-panel">
          <p class="meta-line muted">
            Click “Detect displays” to find monitors DeskMux can control natively, then read
            each input's value for your config.
          </p>
        </div>
      </section>

      <section class="card">
        <h2>Recent events</h2>
        <div id="events-panel"></div>
      </section>

      <section class="card">
        <h2>Apply preset</h2>
        <div class="apply-controls">
          <label class="field">
            <span>Preset</span>
            <select id="preset-select" disabled></select>
          </label>

          <label class="checkbox-field">
            <input id="dry-run" type="checkbox" checked />
            <span>Dry run — preview commands only</span>
          </label>
          <p class="helper">Uncheck to actually switch monitor inputs.</p>

          <button id="apply-btn" type="button" class="btn btn-primary" disabled>
            Apply preset
          </button>
        </div>
      </section>

      <section id="apply-panel" class="card apply-panel" hidden></section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
