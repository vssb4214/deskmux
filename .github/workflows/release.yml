name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build and attach Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # Bundle target (NSIS only) comes from src-tauri/tauri.conf.json - not overridden
      # here, so this can't drift out of sync with what `npm run tauri build` produces
      # in ci.yml.
      - name: Build installer and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          # Draft, not published: this job automates the tedious build+upload step, but
          # a human still reviews and clicks "Publish" on GitHub before it's public.
          releaseDraft: true
          prerelease: false
